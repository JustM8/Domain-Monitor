[phases.setup]
nixPkgs = ["php", "phpPackages.composer", "nodejs"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan key:generate",
  "php artisan config:cache",
  "php artisan route:cache"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"
